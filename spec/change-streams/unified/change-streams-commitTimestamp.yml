description: "change-streams-commitTimestamp"
schemaVersion: "1.7"
runOnRequirements:
  - minServerVersion: "8.2.0"
    topologies: [ sharded ]
    serverless: forbid

createEntities:
  - client:
      id: &client0 client0
      useMultipleMongoses: true
  - database:
      id: &admin admin
      client: *client0
      databaseName: admin
  - database:
      id: &sharded_db sharded_db
      client: *client0
      databaseName: *sharded_db
  - collection:
      id: &collection0 collection0
      database: *sharded_db
      collectionName: *collection0
  - session:
      id: &session0 session0
      client: *client0
      sessionOptions:
        causalConsistency: false

tests:
  - description: "when showExpandedEvents is true, commitTimestamp is included for operations in a prepared transaction"
    operations:
      - name: dropCollection
        object: *sharded_db
        arguments:
          collection: *collection0
      - name: createCollection
        object: *sharded_db
        arguments:
          collection: *collection0

      # Shard the collection and split chunks so x<0 and x>=0 live on different shards
      - name: runCommand
        object: *admin
        arguments:
          commandName: enableSharding
          command:
            enableSharding: *sharded_db
      - name: runCommand
        object: *admin
        arguments:
          commandName: shardCollection
          command:
            shardCollection: "sharded_db.collection0"
            key: { x: 1 }
      - name: runCommand
        object: *admin
        arguments:
          commandName: split
          command:
            split: "sharded_db.collection0"
            middle: { x: 0 }

      # Move the lower chunk to shard0 and the upper chunk to shard1.
      - name: runCommand
        object: *admin
        arguments:
          commandName: moveChunk
          command:
            moveChunk: "sharded_db.collection0"
            find: { x: -1 }
            to: "shard0"
      - name: runCommand
        object: *admin
        arguments:
          commandName: moveChunk
          command:
            moveChunk: "sharded_db.collection0"
            find: { x: 1 }
            to: "shard1"

      - name: createChangeStream
        object: *collection0
        arguments:
          pipeline: []
          showExpandedEvents: true
        saveResultAsEntity: &changeStream0 changeStream0

      # This transaction has to be cross-shard to trigger prepared transaction behavior.
      - name: startTransaction
        object: *session0
        arguments:
          writeConcern: { w: "majority" }
      - name: insertOne
        object: *collection0
        arguments:
          document: { x: -1 }  # targets shard0
          session: *session0
      - name: insertOne
        object: *collection0
        arguments:
          document: { x: 1 }  # targets shard1
          session: *session0
      - name: commitTransaction
        object: *session0

      - name: iterateUntilDocumentOrError
        object: *changeStream0
        expectResult:
          operationType: insert
          ns:
            db: *sharded_db
            coll: *collection0
          commitTimestamp: { $$exists: true }

      # Validate absence in a non-transaction event.
      - name: insertOne
        object: *collection0
        arguments:
          document: { x: 1 }

      - name: iterateUntilDocumentOrError
        object: *changeStream0
        expectResult:
          operationType: insert
          ns:
            db: *sharded_db
            coll: *collection0
          commitTimestamp: { $$exists: false }