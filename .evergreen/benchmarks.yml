# When a task that used to pass starts to fail
# Go through all versions that may have been skipped to detect
# when the task started failing
stepback: true

# Mark a failure as a system/bootstrap failure (purple box) rather then a task
# failure by default.
# Actual testing tasks are marked with `type: test`
command_type: system

# Protect ourself against rogue test case, or curl gone wild, that runs forever
# 60 minutes is the longest we'll ever run
exec_timeout_secs: 3600

pre_error_fails_task: true

include:
  - filename: .evergreen/util.yml

# What to do when evergreen hits the timeout (`post:` tasks are run automatically)
timeout:
  - command: shell.exec
    params:
      script: |
        ls -la

functions:
  "download benchmark data":
    command: shell.exec
    params:
      working_dir: "src"
      script: |
        ${PREPARE_SHELL}
        cd benchmarks && ./download-data.sh

  "run driver benchmarks":
    - command: shell.exec
      type: test
      params:
        shell: bash
        working_dir: "src"
        include_expansions_in_env:
          - MONGODB_URI
        script: |
          ${PREPARE_SHELL}
          .evergreen/run-driver-benchmarks.sh

  "run bson benchmarks":
    - command: shell.exec
      type: test
      params:
        shell: bash
        working_dir: "src"
        script: |
          ${PREPARE_SHELL}

          .evergreen/run-bson-benchmarks.sh

  "compile only":
    - command: shell.exec
      type: test
      params:
        shell: bash
        working_dir: "src"
        script: |
          ${PREPARE_SHELL}
          .evergreen/run-compile-benchmarks.sh

  "upload benchmark results":
    - command: shell.exec
      params:
        script: |
          # We use the requester expansion to determine whether the data is from a mainline evergreen run or not
          if [ "${requester}" == "commit" ]; then
            is_mainline=true
          else
            is_mainline=false
          fi

          parsed_order_id=$(echo "${revision_order_id}" | awk -F'_' '{print $NF}')

          ENCODED_URL=$(echo "https://performance-monitoring-api.corp.mongodb.com/raw_perf_results/cedar_report?project=${project_id}&version=${version_id}&variant=${build_variant}&order=$parsed_order_id&task_name=${task_name}&task_id=${task_id}&execution=${execution}&mainline=$is_mainline" | sed -e 's/ /%20/g')

          # Submit the performance data to the SPS endpoint
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X 'POST' \
            "$ENCODED_URL" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -d @src/benchmark-results.json)

          http_status=$(echo "$response" | grep "HTTP_STATUS" | awk -F':' '{print $2}')
          response_body=$(echo "$response" | sed '/HTTP_STATUS/d')

          # We want to throw an error if the data was not successfully submitted
          if [ "$http_status" -ne 200 ]; then
            echo "Error: Received HTTP status $http_status"
            echo "Response Body: $response_body"
            exit 1
          fi

          echo "Response Body: $response_body"
          echo "HTTP Status: $http_status"

pre:
  - func: "fetch source"
  - func: "create expansions"
  - func: "prepare resources"
  - func: "windows fix"
  - func: "fix absolute paths"
  - func: "init test-results"
  - func: "make files executable"
  - func: "install rust"
  - func: "download benchmark data"

post:
  - func: "stop mongo orchestration"
  - func: "cleanup"

tasks:
  - name: "benchmark-driver"
    tags: ["driver"]
    commands:
      - func: "bootstrap mongo-orchestration"
        vars:
          MONGODB_VERSION: "v8.0-perf"
          # Note that drivers-evergreen-tools expects `SSL` as the environmental
          # variable, not `TLS`, so we have to use that for the actual value used in the
          # script; we use `TLS` for the metadata that isn't used by the actual shell
          # scripts.
          AUTH: "auth"
          SSL: "ssl"
      - func: "run driver benchmarks"
      - func: "upload benchmark results"

  - name: "benchmark-bson"
    tags: ["bson"]
    commands:
      - func: "run bson benchmarks"
      - func: "upload benchmark results"

  - name: "benchmark-compile"
    commands:
      - func: "compile only"
      - func: "upload benchmark results"

# Note: the names of the build variants are intentionally preserved from their previous names
# generated by a matrix definition to maintain comparison ability across benchmark history.
buildvariants:
  - name: "driver benchmarks__topology~standalone_os~rhel90-dbx-perf-large"
    display_name: "Benchmark Standalone"
    run_on: rhel90-dbx-perf-large
    expansions:
      TOPOLOGY: "server"
      PYTHON: "/opt/mongodbtoolchain/v3/bin/python"
      VENV_BIN_DIR: "bin"
    tasks:
      - ".driver"

  - name: "driver benchmarks__topology~replica-set_os~rhel90-dbx-perf-large"
    display_name: "Benchmark Replica Set"
    run_on: rhel90-dbx-perf-large
    expansions:
      TOPOLOGY: "replica_set"
      PYTHON: "/opt/mongodbtoolchain/v3/bin/python"
      VENV_BIN_DIR: "bin"
    tasks:
      - ".driver"

  - name: "driver benchmarks__topology~sharded-cluster_os~rhel90-dbx-perf-large"
    display_name: "Benchmark Sharded"
    run_on: rhel90-dbx-perf-large
    expansions:
      TOPOLOGY: "sharded_cluster"
      PYTHON: "/opt/mongodbtoolchain/v3/bin/python"
      VENV_BIN_DIR: "bin"
    tasks:
      - ".driver"

  - name: "bson benchmarks__os~rhel90-dbx-perf-large"
    display_name: "BSON Benchmarks"
    run_on: rhel90-dbx-perf-large
    expansions:
      PYTHON: "/opt/mongodbtoolchain/v3/bin/python"
      VENV_BIN_DIR: "bin"
    tasks:
      - ".bson"

  - name: "compile-only__os~rhel90-dbx-perf-large"
    display_name: "Compile"
    run_on: rhel90-dbx-perf-large
    expansions:
      PYTHON: "/opt/mongodbtoolchain/v3/bin/python"
      VENV_BIN_DIR: "bin"
    tasks:
      - "benchmark-compile"
